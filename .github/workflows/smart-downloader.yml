concurrency:
  group: download-${{ github.ref }}
  cancel-in-progress: false

name: '📦 حرفه‌ای: دانلود و ذخیره در مخزن (ترتیبی و ایمن)'

on:
  workflow_dispatch:
    inputs:
      file_urls:
        description: '🔗 لینک مستقیم فایل‌ها (با کاما جدا کنید) مثال: url1,url2,url3'
        required: true
        type: string
        default: 'LINK1,LINK2,LINK3'
      password:
        description: '🔐 رمز فایل فشرده (اختیاری)'
        required: false
        type: string
        default: ''
      split_size:
        description: '📦 حجم هر تکه (پیش‌فرض: 95m)'
        required: false
        type: string
        default: '95m'

permissions:
  contents: write

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 دریافت کد مخزن
        uses: actions/checkout@v4

      - name: ⚙️ نصب ابزارها
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full file

      - name: 🔍 نمایش و بررسی لینک‌های ورودی
        run: |
          echo "=========================================="
          echo "📋 لیست لینک‌هایی که برای دانلود وارد کرده‌اید:"
          echo "=========================================="
          echo "${{ github.event.inputs.file_urls }}" | sed 's/,/\n/g' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed '/^$/d'
          echo "=========================================="

      - name: 📥 پردازش، دانلود و پوش مجزای فایل‌ها
        id: process
        run: |
          # تنظیم مشخصات گیت برای کل فرآیند
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # تبدیل ورودی به فایل (یک URL در هر خط)
          echo "${{ github.event.inputs.file_urls }}" | sed 's/,/\n/g' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed '/^$/d' > /tmp/urls.txt

          SUCCESS_COUNT=0
          FAILED_COUNT=0
          touch /tmp/failed_links.txt

          # خواندن خط به خط لینک‌ها به صورت ترتیبی
          while IFS= read -r URL || [ -n "$URL" ]; do
            echo "----------------------------------------"
            echo "🔽 شروع فرآیند برای لینک: $URL"
            
            # استخراج و ایمن‌سازی نام فایل
            FILENAME=$(basename "$URL" | sed 's/\?.*//;s/%20/ /g')
            [ -z "$FILENAME" ] && FILENAME="downloaded_$(date +%s)_$RANDOM"
            SAFE_FILENAME=$(echo "$FILENAME" | sed 's/[\\/:*?"<>|]/_/g')
            
            TMP_DOWNLOAD=$(mktemp --suffix="-$SAFE_FILENAME")
            
            # تلاش برای دانلود
            if curl -L --fail --retry 3 --retry-delay 2 --progress-bar -o "$TMP_DOWNLOAD" "$URL"; then
              echo "✅ دریافت شد: $SAFE_FILENAME"
              
              # تشخیص نوع فایل و دسته‌بندی
              MIME=$(file -b --mime-type -- "$TMP_DOWNLOAD")
              EXT="${SAFE_FILENAME##*.}"
              EXT=$(echo "$EXT" | tr '[:upper:]' '[:lower:]')
              
              if [[ "$MIME" == video/* ]] || [[ "$EXT" =~ ^(mp4|mkv|avi|mov|wmv|flv|webm)$ ]]; then
                CAT="video"
              elif [[ "$MIME" == audio/* ]] || [[ "$EXT" =~ ^(mp3|wav|ogg|flac|m4a)$ ]]; then
                CAT="audio"
              elif [[ "$MIME" == image/* ]] || [[ "$EXT" =~ ^(jpg|jpeg|png|gif|bmp|webp)$ ]]; then
                CAT="image"
              elif [[ "$MIME" == application/pdf ]] || [[ "$EXT" =~ ^(pdf|doc|docx|xls|xlsx|ppt|pptx|txt)$ ]]; then
                CAT="document"
              else
                CAT="other"
              fi
              
              mkdir -p "downloads/$CAT"
              FINAL_DIR=$(mktemp -d "downloads/$CAT/${SAFE_FILENAME%.*}_XXXXXX")
              
              # فشرده‌سازی و تکه‌تکه کردن
              if [ -z "${{ github.event.inputs.password }}" ]; then
                7z a -mhe=on -mx=3 -v${{ github.event.inputs.split_size }} "$FINAL_DIR/archive.7z" "$TMP_DOWNLOAD"
              else
                7z a -p"${{ github.event.inputs.password }}" -mhe=on -mx=3 -v${{ github.event.inputs.split_size }} "$FINAL_DIR/archive.7z" "$TMP_DOWNLOAD"
              fi
              
              rm -f -- "$TMP_DOWNLOAD"
              echo "✅ فشرده‌سازی انجام شد: $FINAL_DIR"
              
              # کامیت و پوش فوری همین فایل به مخزن
              git add "$FINAL_DIR"
              git commit -m "📦 افزوده شد: $SAFE_FILENAME [$(date +'%Y-%m-%d %H:%M')]"
              
              # دریافت آخرین تغییرات احتمالی و پوش
              git pull --rebase origin main
              git push origin HEAD:main
              
              SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
              echo "🚀 فایل با موفقیت به ریپازیتوری منتقل شد."
            else
              echo "❌ خطا در دانلود این لینک: $URL"
              echo "$URL" >> /tmp/failed_links.txt
              FAILED_COUNT=$((FAILED_COUNT + 1))
              rm -f "$TMP_DOWNLOAD"
            fi
          done < /tmp/urls.txt

          # مدیریت لینک‌های ناموفق در پایان کار
          if [ $FAILED_COUNT -gt 0 ]; then
            echo "📝 در حال ثبت لینک‌های ناموفق..."
            mv /tmp/failed_links.txt ./failed_links.txt
            git add failed_links.txt
            git commit -m "⚠️ ثبت لینک‌های ناموفق در دانلود [$(date +'%Y-%m-%d %H:%M')]" || echo "No changes to commit"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

          # بررسی وضعیت نهایی برای پاس یا رد شدن کل پایپ‌لاین
          echo "=========================================="
          echo "📊 آمار نهایی: موفق ($SUCCESS_COUNT) | ناموفق ($FAILED_COUNT)"
          echo "=========================================="
          
          if [ $SUCCESS_COUNT -eq 0 ]; then
            echo "🛑 خطا: هیچ‌کدام از لینک‌ها با موفقیت دانلود نشدند!"
            exit 1
          fi
          
          echo "🎉 عملیات کلی با موفقیت پایان یافت."
