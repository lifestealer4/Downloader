concurrency:
  group: download-${{ github.ref }}
  cancel-in-progress: false

name: '📦 حرفه‌ای: دانلود همزمان و پوش مجزا'

on:
  workflow_dispatch:
    inputs:
      file_urls:
        description: '🔗 لینک‌ها (با "فاصله" یا "اینتر" جدا کنید، نه کاما!)'
        required: true
        type: string
        default: 'LINK1 LINK2'
      password:
        description: '🔐 رمز فایل فشرده (اختیاری)'
        required: false
        type: string
        default: ''
      split_size:
        description: '📦 حجم هر تکه (پیش‌فرض: 95m)'
        required: false
        type: string
        default: '95m'

permissions:
  contents: write

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 دریافت کد مخزن
        uses: actions/checkout@v4

      - name: ⚙️ نصب ابزارها
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full file

      - name: 🔍 پیش‌نمایش لینک‌های ورودی
        run: |
          echo "=========================================="
          echo "📋 لیست لینک‌هایی که پردازش خواهند شد:"
          echo "=========================================="
          # جداسازی بر اساس فاصله یا خط جدید (کاماهای داخل لینک دست نخورده می‌مانند)
          echo "${{ github.event.inputs.file_urls }}" | awk '{for(i=1;i<=NF;i++) print $i}'
          echo "=========================================="

      - name: 📥 دانلود همزمان و پوش مجزا
        id: process
        run: |
          # تنظیم مشخصات گیت
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # استخراج لینک‌ها
          echo "${{ github.event.inputs.file_urls }}" | awk '{for(i=1;i<=NF;i++) print $i}' > /tmp/urls.txt
          
          # ایجاد پوشه‌های موقت برای شمارش موفقیت/شکست در پردازش‌های موازی
          mkdir -p /tmp/success_tracker
          mkdir -p /tmp/fail_tracker
          touch /tmp/failed_links.txt

          # خروجی کردن متغیرها برای استفاده در زیرپردازه‌ها (Subshells)
          export SPLIT_SIZE="${{ github.event.inputs.split_size }}"
          export ZIP_PASS="${{ github.event.inputs.password }}"

          process_url() {
            URL="$1"
            echo "🔽 شروع فرآیند: $URL"
            
            # استخراج نام فایل و حذف پارامترهای اضافی در صورت وجود
            FILENAME=$(basename "$URL" | awk -F'?' '{print $1}')
            [ -z "$FILENAME" ] || [[ "$FILENAME" == *"="* ]] && FILENAME="downloaded_$(date +%s)_$RANDOM"
            SAFE_FILENAME=$(echo "$FILENAME" | sed 's/[\\/:*?"<>|]/_/g')
            
            TMP_DOWNLOAD=$(mktemp --suffix="-$SAFE_FILENAME")
            
            # دانلود فایل
            if curl -L --fail --retry 3 --retry-delay 2 --progress-bar -o "$TMP_DOWNLOAD" "$URL"; then
              echo "✅ دانلود شد: $SAFE_FILENAME"
              
              MIME=$(file -b --mime-type -- "$TMP_DOWNLOAD")
              EXT="${SAFE_FILENAME##*.}"
              EXT=$(echo "$EXT" | tr '[:upper:]' '[:lower:]')
              
              if [[ "$MIME" == video/* ]] || [[ "$EXT" =~ ^(mp4|mkv|avi|mov|wmv|flv|webm)$ ]]; then CAT="video"
              elif [[ "$MIME" == audio/* ]] || [[ "$EXT" =~ ^(mp3|wav|ogg|flac|m4a)$ ]]; then CAT="audio"
              elif [[ "$MIME" == image/* ]] || [[ "$EXT" =~ ^(jpg|jpeg|png|gif|bmp|webp)$ ]]; then CAT="image"
              elif [[ "$MIME" == application/pdf ]] || [[ "$EXT" =~ ^(pdf|doc|docx|xls|xlsx|ppt|pptx|txt)$ ]]; then CAT="document"
              else CAT="other"; fi
              
              mkdir -p "downloads/$CAT"
              FINAL_DIR=$(mktemp -d "downloads/$CAT/${SAFE_FILENAME%.*}_XXXXXX")
              
              # فشرده‌سازی
              if [ -z "$ZIP_PASS" ]; then
                7z a -mhe=on -mx=3 -v"$SPLIT_SIZE" "$FINAL_DIR/archive.7z" "$TMP_DOWNLOAD"
              else
                7z a -p"$ZIP_PASS" -mhe=on -mx=3 -v"$SPLIT_SIZE" "$FINAL_DIR/archive.7z" "$TMP_DOWNLOAD"
              fi
              
              rm -f -- "$TMP_DOWNLOAD"
              
              # --- بخش حیاتی: پوش به مخزن با استفاده از قفل (flock) ---
              # این بلاک اطمینان می‌دهد که در هر لحظه فقط یک فایل در حال پوش شدن است
              (
                flock -x 200
                echo "🔒 در حال همگام‌سازی و پوش فایل: $SAFE_FILENAME"
                git add "$FINAL_DIR"
                git commit -m "📦 افزوده شد: $SAFE_FILENAME" || true
                git pull --rebase origin main
                git push origin HEAD:main
                echo "🔓 پوش انجام شد. قفل آزاد شد."
              ) 200>/tmp/git_push.lock
              # -----------------------------------------------------

              touch "/tmp/success_tracker/$RANDOM$RANDOM"
            else
              echo "❌ خطا در دانلود: $URL"
              # ثبت لینک خراب (استفاده از قفل برای جلوگیری از تداخل در نوشتن فایل متنی)
              (
                flock -x 200
                echo "$URL" >> /tmp/failed_links.txt
              ) 200>/tmp/git_push.lock
              
              touch "/tmp/fail_tracker/$RANDOM$RANDOM"
              rm -f "$TMP_DOWNLOAD"
            fi
          }
          
          export -f process_url
          
          # اجرای دانلودها به صورت همزمان (حداکثر 4 فایل همزمان برای جلوگیری از افت کیفیت سرورهای گیت‌هاب)
          cat /tmp/urls.txt | xargs -n 1 -P 4 bash -c 'process_url "$@"' _
          
          # محاسبه آمار نهایی
          SUCCESS_COUNT=$(ls -1q /tmp/success_tracker/ | wc -l)
          FAILED_COUNT=$(ls -1q /tmp/fail_tracker/ | wc -l)
          
          echo "=========================================="
          echo "📊 آمار نهایی: موفق ($SUCCESS_COUNT) | ناموفق ($FAILED_COUNT)"
          echo "=========================================="
          
          # اگر لینکی خراب شده بود، فایل متنی آن پوش می‌شود
          if [ $FAILED_COUNT -gt 0 ]; then
            echo "📝 پوش کردن لیست لینک‌های ناموفق..."
            mv /tmp/failed_links.txt ./failed_links.txt
            git add failed_links.txt
            git commit -m "⚠️ ثبت لینک‌های ناموفق در دانلود [$(date +'%Y-%m-%d %H:%M')]" || true
            git pull --rebase origin main
            git push origin HEAD:main
          fi
          
          # در صورتی که همه لینک‌ها خطا داده باشند، اکشن Fail می‌شود
          if [ $SUCCESS_COUNT -eq 0 ]; then
            echo "🛑 خطا: تمام لینک‌ها با شکست مواجه شدند."
            exit 1
          fi
