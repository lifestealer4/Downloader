concurrency:
  group: download-${{ github.ref }}
  cancel-in-progress: false
name: '📦 حرفه‌ای: دانلود و ذخیره در مخزن'

on:
  workflow_dispatch:
    inputs:
      file_urls:
        description: '🔗 لینک مستقیم فایل‌ها (با کاما جدا کنید) مثال: url1,url2,url3'
        required: true
        type: string
        default: 'LINK1,LINK2,LINK3'
      password:
        description: '🔐 رمز فایل فشرده (اختیاری)'
        required: false
        type: string
        default: ''
      split_size:
        description: '📦 حجم هر تکه (پیش‌فرض: 95m)'
        required: false
        type: string
        default: '95m'

permissions:
  contents: write

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 دریافت کد مخزن
        uses: actions/checkout@v4

      - name: ⚙️ نصب ابزارها
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full file

      - name: 📥 پردازش و دانلود همه فایل‌ها
        id: process
        run: |
          # 1. نمایش لینک‌های ورودی
          echo "🔗 لینک‌های ورودی:"
          echo "${{ github.event.inputs.file_urls }}" | sed 's/,https/\nhttps/g' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed '/^$/d'
          echo ""

          # 2. جدا کردن URLها (با در نظر گرفتن کاماهای داخلی)
          echo "${{ github.event.inputs.file_urls }}" | sed 's/,https/\nhttps/g' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed '/^$/d' > /tmp/urls.txt
          
          # 3. پاکسازی فایل‌های موقت قبلی
          rm -f /tmp/success_* /tmp/failed_*

          MAX_PARALLEL=8
          
          process_url() {
            URL="$1"
            echo "🔽 شروع دانلود: $URL"
            
            FILENAME=$(basename "$URL" | sed 's/\?.*//;s/%20/ /g')
            [ -z "$FILENAME" ] && FILENAME="downloaded_$(date +%s)_$RANDOM"
            SAFE_FILENAME=$(echo "$FILENAME" | sed 's/[\\/:*?"<>|]/_/g')
            
            TMP_DOWNLOAD=$(mktemp --suffix="-$SAFE_FILENAME")
            curl -L --fail --retry 3 --retry-delay 2 --progress-bar -o "$TMP_DOWNLOAD" "$URL"
            if [ $? -ne 0 ]; then
              echo "❌ خطا در دانلود: $URL"
              echo "$URL" >> "/tmp/failed_${BASHPID}_$RANDOM.txt"
              rm -f "$TMP_DOWNLOAD"
              return 1
            fi
            echo "✅ دریافت شد: $SAFE_FILENAME"
            
            MIME=$(file -b --mime-type -- "$TMP_DOWNLOAD")
            EXT="${SAFE_FILENAME##*.}"
            EXT=$(echo "$EXT" | tr '[:upper:]' '[:lower:]')
            
            if [[ "$MIME" == video/* ]] || [[ "$EXT" =~ ^(mp4|mkv|avi|mov|wmv|flv|webm)$ ]]; then
              CAT="video"
            elif [[ "$MIME" == audio/* ]] || [[ "$EXT" =~ ^(mp3|wav|ogg|flac|m4a)$ ]]; then
              CAT="audio"
            elif [[ "$MIME" == image/* ]] || [[ "$EXT" =~ ^(jpg|jpeg|png|gif|bmp|webp)$ ]]; then
              CAT="image"
            elif [[ "$MIME" == application/pdf ]] || [[ "$EXT" =~ ^(pdf|doc|docx|xls|xlsx|ppt|pptx|txt)$ ]]; then
              CAT="document"
            else
              CAT="other"
            fi
            
            mkdir -p "downloads/$CAT"
            FINAL_DIR=$(mktemp -d "downloads/$CAT/${SAFE_FILENAME%.*}_XXXXXX")
            
            if [ -z "${{ github.event.inputs.password }}" ]; then
              7z a -mhe=on -mx=3 -v${{ github.event.inputs.split_size }} "$FINAL_DIR/archive.7z" "$TMP_DOWNLOAD"
            else
              7z a -p"${{ github.event.inputs.password }}" -mhe=on -mx=3 -v${{ github.event.inputs.split_size }} "$FINAL_DIR/archive.7z" "$TMP_DOWNLOAD"
            fi
            
            echo "✅ ذخیره شد: $FINAL_DIR ← $SAFE_FILENAME"
            echo "$FINAL_DIR" >> "/tmp/success_${BASHPID}_$RANDOM.txt"
            rm -f -- "$TMP_DOWNLOAD"
          }
          
          export -f process_url
          cat /tmp/urls.txt | xargs -I {} -P $MAX_PARALLEL bash -c 'process_url "$@"' _ {}
          
          # 4. جمع‌آوری نتایج
          cat /tmp/success_* 2>/dev/null > /tmp/all_success.txt
          cat /tmp/failed_* 2>/dev/null > /tmp/all_failed.txt
          
          # 5. تنظیمات git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 6. پوش هر فایل موفق به صورت جداگانه
          if [ -s /tmp/all_success.txt ]; then
            while IFS= read -r dir; do
              echo "📤 در حال پوش: $dir"
              git pull --rebase origin main
              git add "$dir"
              git commit -m "Add file $(basename "$dir")"
              git push
            done < /tmp/all_success.txt
          fi
          
          # 7. اگر لینک ناموفق وجود داشت، فایل آن را پوش کن
          if [ -s /tmp/all_failed.txt ]; then
            echo "⚠️ برخی لینک‌ها ناموفق بودند. در حال ایجاد failed_urls.txt ..."
            cp /tmp/all_failed.txt failed_urls.txt
            git pull --rebase origin main
            git add failed_urls.txt
            git commit -m "Update failed downloads list"
            git push
            
            # اگر هیچ فایل موفقی نبود، کل گردش کار با خطا متوقف شود
            if [ ! -s /tmp/all_success.txt ]; then
              echo "❌ هیچ فایلی با موفقیت دانلود نشد!"
              exit 1
            fi
          fi
          
          echo "🎉 همه عملیات با موفقیت انجام شد."
